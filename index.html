<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia Studio</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Comic Sans MS", "Comic Sans", cursive, sans-serif;
            user-select: none;
        }

        body {
            background-color: white;
            color: black;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #setup-overlay, #publish-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(255,255,255,0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #publish-overlay { display: none; background: rgba(0,0,0,0.5); }

        .setup-box, .publish-box {
            border: 3px solid black;
            padding: 25px;
            width: 420px;
            background: white;
            max-height: 90vh;
            overflow-y: auto;
        }

        /* TOOLBAR */
        #toolbar {
            height: 65px;
            border-bottom: 3px solid black;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 12px;
            background: white;
            z-index: 10;
        }
        .tool-btn-pkg {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 4px 10px;
            border: 2px solid transparent;
            background: none;
        }
        .tool-btn-pkg img {
            width: 22px;
            height: 22px;
            object-fit: contain;
            margin-bottom: 2px;
        }
        .tool-btn-pkg span {
            font-size: 11px;
            font-weight: bold;
        }
        .tool-btn-pkg.active {
            border-color: black;
            background: #f0f0f0;
        }
        .action-btn {
            padding: 6px 12px;
            border: 2px solid black;
            background: white;
            font-weight: bold;
            cursor: pointer;
        }

        #mp-switcher-bar {
            display: none;
            background: #f0f0f0;
            border-bottom: 2px solid black;
            padding: 5px 15px;
            gap: 10px;
            align-items: center;
        }
        .player-tab-btn {
            padding: 4px 12px;
            border: 2px solid black;
            background: white;
            font-weight: bold;
            cursor: pointer;
        }
        .player-tab-btn.active { background: black; color: white; }

        /* MAIN APP CONTAINER */
        #workspace {
            display: flex;
            flex: 1;
            height: calc(100vh - 65px);
        }

        #left-panel {
            width: 280px;
            border-right: 3px solid black;
            display: flex;
            flex-direction: column;
            background: white;
            z-index: 5;
        }
        .tab-headers { display: flex; border-bottom: 2px solid black; }
        .tab-btn { flex: 1; padding: 10px; background: white; border: none; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: black; color: white; }
        
        .tab-content { display: none; padding: 15px; flex: 1; overflow-y: auto; }
        .tab-content.active { display: block; }
        
        .asset-card {
            border: 2px solid black;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            background: white;
        }
        .asset-card:hover { background: #f0f0f0; }

        /* VIEWPORT WINDOW */
        #viewport-container {
            flex: 1;
            background: #e0e0e0;
            position: relative;
            overflow: hidden;
        }
        #camera-space { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
        #camera-space.smooth-track { transition: transform 0.1s ease-out; }
        #map-grid { background: white; border: 3px solid black; position: relative; image-rendering: pixelated; }

        /* GEOMETRY CORE GENERATORS & TEXTURES */
        .editor-obj { position: absolute; box-sizing: border-box; background-repeat: repeat !important; background-size: 40px 40px !important; }
        .editor-obj.selected { outline: 2px dashed black !important; outline-offset: 2px; }
        
        /* Material Texture Assignments */
        .editor-obj.mat-plastic { background-image: none; }
        .editor-obj.mat-grass { background-image: url('grass.png'); }
        .editor-obj.mat-brick { background-image: url('brick.png'); }
        .editor-obj.mat-stone { background-image: url('stone.png'); }
        .editor-obj.mat-wood { background-image: url('wood.png'); }
        .editor-obj.mat-sand { background-image: url('sand.png'); }
        .editor-obj.mat-metal { background-image: url('metal.png'); }

        .shape-cube { border: 2px solid black; }
        .shape-circle { border: 2px solid black; border-radius: 50%; }
        .shape-wedge { border: none !important; background: transparent !important; }
        .shape-halfcircle { border: 2px solid black; border-bottom: none; border-radius: 100px 100px 0 0; }
        .shape-arch { border: 2px solid black; border-bottom: none; border-radius: 50% 50% 0 0 / 100% 100% 0 0; }
        .shape-octagon { border: none !important; background: transparent !important; }
        
        /* Sign Configuration Container */
        .shape-sign {
            border: 2px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            word-break: break-word;
            padding: 4px;
        }
        .shape-sign span {
            width: 100%;
            display: block;
            line-height: 1.1;
            font-weight: bold;
        }

        .obj-spawn { border: 2px dashed green; background: rgba(0,255,0,0.15) !important; background-image: none !important; }
        .obj-kill { border: 2px solid red; background: rgba(255,0,0,0.2) !important; background-image: none !important; }
        .obj-spinning { border: 2px solid purple; }

        .dropped-tool {
            position: absolute; width: 35px; height: 35px; border: 2px solid black; background: white;
            background-size: 70% 70%; background-repeat: no-repeat; background-position: center; z-index: 80;
        }
        .dropped-tool.selected { outline: 2px dashed red; }

        /* GUN BULLET PROJECTILE ELEMENT */
        .bullet-projectile {
            position: absolute; width: 6px; height: 6px; background: #ffcc00; border: 1px solid black; border-radius: 50%; z-index: 98;
        }

        /* SCALE NODES */
        .scale-handle { position: absolute; width: 16px; height: 16px; background: #00e1ff; border: 2px solid black; border-radius: 50% !important; z-index: 110; }
        .handle-t { top: -9px; left: calc(50% - 8px); cursor: ns-resize; }
        .handle-b { bottom: -9px; left: calc(50% - 8px); cursor: ns-resize; }
        .handle-l { left: -9px; top: calc(50% - 8px); cursor: ew-resize; }
        .handle-r { right: -9px; top: calc(50% - 8px); cursor: ew-resize; }
        
        .rotate-handle { position: absolute; width: 16px; height: 16px; background: #ffff00; border: 2px solid black; border-radius: 50% !important; top: -32px; left: calc(50% - 8px); cursor: grab; z-index: 111; }
        .rotate-line { position: absolute; width: 2px; height: 18px; background: black; top: -18px; left: calc(50% - 1px); z-index: 109; }

        /* PATH VISUALIZER NODES */
        .path-line-svg { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:4; }
        .visual-node-dot { position: absolute; width: 14px; height: 14px; border: 2px solid black; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: auto; cursor: move; }
        .node-dot-a { background: #00ff55; }
        .node-dot-b { background: #ff0055; }

        /* CHARACTERS & WIELDABLES */
        .player-character {
            position: absolute; width: 75px; height: 75px;
            background-image: url('Character.png'); background-size: contain;
            background-repeat: no-repeat; background-position: center; z-index: 95;
        }
        
        .tool-overlay-node {
            position: absolute; width: 42px; height: 42px;
            background-size: contain; background-repeat: no-repeat;
            bottom: 15px; z-index: 96;
            transform-origin: bottom center;
            transition: transform 0.05s ease-out;
            display: none;
        }
        
        .tool-overlay-node.pos-right {
            left: 42px;
            transform: rotate(35deg);
        }
        .tool-overlay-node.pos-left {
            left: -8px;
            transform: scaleX(-1) rotate(35deg);
        }

        .health-bar-container { position: absolute; top: -15px; left: 7px; width: 60px; height: 6px; border: 1px solid black; background: red; }
        .health-bar-fill { width: 100%; height: 100%; background: #00ff00; }
        .player-label { position: absolute; top: -32px; left: 7px; width: 60px; text-align: center; font-size: 10px; font-weight: bold; background: rgba(255,255,255,0.7); }

        /* FLOATING COOLDOWN TEXT STYLE */
        #hammer-cooldown-indicator {
            position: fixed;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.85);
            color: #ffff00;
            padding: 4px 8px;
            border: 2px solid black;
            font-weight: bold;
            font-size: 13px;
            z-index: 5000;
            display: none;
            transform: translate(15px, 15px);
        }

        /* HOTBAR */
        #hud-hotbar {
            display: none; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.9); border: 3px solid black; padding: 5px; gap: 8px; z-index: 99;
        }
        .hotbar-slot { 
            width: 50px; height: 50px; border: 2px solid gray; background-color: white; 
            background-size: 30px 30px; background-repeat: no-repeat; background-position: center; cursor: pointer; 
        }
        .hotbar-slot.selected { border-color: black; background-color: #e0f0ff; }

        /* PROPERTIES */
        #right-panel { width: 260px; border-left: 3px solid black; padding: 15px; background: white; overflow-y: auto; z-index: 5; }
        input, select, textarea { display: block; width: 100%; padding: 6px; margin-bottom: 12px; border: 2px solid black; background: white; }
        label { font-size: 11px; font-weight: bold; display: block; margin-bottom: 3px; }
        .inline-checkbox-container { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .inline-checkbox-container input { width: auto; margin: 0; }

        #death-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(220,0,0,0.9); color: white;
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000;
        }
    </style>
</head>
<body>

    <div id="hammer-cooldown-indicator">Cooldown: 3</div>

    <div id="setup-overlay">
        <div class="setup-box">
            <h2>Arcadia Studio</h2>
            <br>
            <label>Map Size (Meters):</label>
            <input type="number" id="map-size-input" value="40" min="10" max="200">
            <button class="action-btn" onclick="initializeStudioWorkspace()" style="width:100%;">Create Environment</button>
            <br><br><hr><br>
            <label>Load Map Data:</label>
            <input type="text" id="load-string-input" placeholder="Paste data here...">
            <button class="action-btn" onclick="loadFromString()" style="width:100%;">Load Project</button>
        </div>
    </div>

    <div id="publish-overlay">
        <div class="publish-box">
            <h3>Publish Map</h3>
            <br>
            <label>Title:</label>
            <input type="text" id="pub-title" placeholder="My Map">
            
            <label>Description:</label>
            <textarea id="pub-desc" rows="2" placeholder="About this map..."></textarea>
            
            <label>Upload Game Icon:</label>
            <input type="file" id="pub-icon" accept="image/*">

            <label>Upload Thumbnail:</label>
            <input type="file" id="pub-thumb" accept="image/*">

            <hr style="margin-bottom:12px;">
            
            <label>Creator Account Username:</label>
            <input type="text" id="pub-user" placeholder="Username">

            <label>Confirm Account Password:</label>
            <input type="password" id="pub-pass" placeholder="••••••••">
            
            <div style="display:flex; gap:10px;">
                <button class="action-btn" style="flex:1; border-color:red;" onclick="document.getElementById('publish-overlay').style.display='none'">Cancel</button>
                <button class="action-btn" style="flex:1; border-color:green;" onclick="executeProjectPublishPipeline()">Verify & Submit</button>
            </div>
        </div>
    </div>

    <div id="toolbar">
        <span style="font-weight: bold; border-right: 2px solid black; padding-right: 15px;">Arcadia Studio</span>
        
        <button id="btn-tool-move" class="tool-btn-pkg active" onclick="setActiveTool('move')">
            <img src="move.png" alt="Move">
            <span>Move</span>
        </button>
        <button id="btn-tool-scale" class="tool-btn-pkg" onclick="setActiveTool('scale')">
            <img src="scale.png" alt="Scale">
            <span>Scale</span>
        </button>
        <button id="btn-tool-rotate" class="tool-btn-pkg" onclick="setActiveTool('rotate')">
            <img src="rotate.png" alt="Rotate">
            <span>Rotate</span>
        </button>

        <div style="flex:1;"></div>
        
        <div style="display:flex; align-items:center; gap:5px;">
            <label style="margin:0;">Players:</label>
            <input type="number" id="mp-spawn-count" value="1" min="1" max="10" style="width:55px; margin:0; padding:3px;">
        </div>

        <button id="btn-playtest" class="action-btn" style="color: green; border-color: green;" onclick="togglePlaytestMode()">Playtest Game</button>
        <button class="action-btn" onclick="generateSaveString()">Save Game</button>
        <button class="action-btn" style="background: #e5ffdf;" onclick="document.getElementById('publish-overlay').style.display='flex'">Publish</button>
    </div>

    <div id="mp-switcher-bar"></div>

    <div id="workspace">
        <div id="left-panel">
            <div class="tab-headers">
                <button id="tab-btn-basic" class="tab-btn active" onclick="switchTab('basic')">Geometry</button>
                <button id="tab-btn-scripted" class="tab-btn" onclick="switchTab('scripted')">Logic</button>
                <button id="tab-btn-tools" class="tab-btn" onclick="switchTab('tools')">Tools</button>
            </div>
            
            <div id="tab-basic" class="tab-content active">
                <div class="asset-card" onclick="spawnMapElement('cube', 'cube')">+ Cube</div>
                <div class="asset-card" onclick="spawnMapElement('circle', 'circle')">+ Circle</div>
                <div class="asset-card" onclick="spawnMapElement('wedge', 'wedge')">+ Wedge</div>
                <div class="asset-card" onclick="spawnMapElement('halfcircle', 'halfcircle')">+ Half Circle</div>
                <div class="asset-card" onclick="spawnMapElement('arch', 'arch')">+ Arch</div>
                <div class="asset-card" onclick="spawnMapElement('octagon', 'octagon')">+ Octagon</div>
                <div class="asset-card" onclick="spawnMapElement('sign', 'sign')">+ Sign Block</div>
                <div class="asset-card" onclick="spawnMapElement('spawn', 'cube')">+ Spawnpoint</div>
            </div>

            <div id="tab-scripted" class="tab-content">
                <div class="asset-card" onclick="spawnMapElement('kill', 'cube')">+ Kill Brick</div>
                <div class="asset-card" onclick="spawnMapElement('moving', 'cube')">+ Moving Block</div>
                <div class="asset-card" onclick="spawnMapElement('spinning', 'cube')">+ Spinning Part</div>
            </div>

            <div id="tab-tools" class="tab-content">
                <div class="asset-card" onclick="spawnToolElement('sword')">+ Spawn Sword</div>
                <div class="asset-card" onclick="spawnToolElement('hammer')">+ Spawn Hammer</div>
                <div class="asset-card" onclick="spawnToolElement('gun')">+ Spawn Gun</div>
            </div>
        </div>

        <div id="viewport-container">
            <div id="death-screen">
                <h1>You Died!</h1>
                <br>
                <button class="action-btn" onclick="respawnActiveCharacter()">Respawn</button>
            </div>

            <div id="camera-space">
                <div id="map-grid">
                    <svg id="path-visualizer-canvas" class="path-line-svg"></svg>
                    <div id="players-layer"></div>
                    <div id="path-nodes-layer"></div>
                    <div id="projectiles-layer"></div>
                </div>
            </div>

            <div id="hud-hotbar" style="display: flex;"></div>
        </div>

        <div id="right-panel">
            <h3>Properties</h3>
            <br><hr><br>
            
            <label>Map Size (Meters):</label>
            <input type="number" id="live-map-resize" value="40" min="10" max="300" oninput="changeMapDimensionsLive(this.value)">
            <br><hr><br>

            <div id="properties-empty-notice" style="color: gray; font-style: italic;">Select something to edit properties.</div>
            
            <div id="properties-editor-form" style="display: none;">
                <label>ID:</label>
                <input type="text" id="prop-id" readonly style="background: #eee;">

                <div id="prop-field-tool-options" style="display: none; border: 2px dashed black; padding: 10px; margin-bottom: 12px;">
                    <label style="color:blue;">Tool Setup:</label>
                    <button class="action-btn" style="width:100%; font-size:11px;" onclick="moveSelectedToolToInventory()">Give to Everyone</button>
                </div>

                <div id="prop-field-text" style="display: none;">
                    <label>Sign Text:</label>
                    <input type="text" id="prop-text" value="Hello World" oninput="updateSelectedObjectProperties()">
                </div>

                <div id="prop-field-material">
                    <label>Texture:</label>
                    <select id="prop-material" onchange="updateSelectedObjectProperties()">
                        <option value="plastic">Plastic</option>
                        <option value="grass">Grass</option>
                        <option value="brick">Brick</option>
                        <option value="stone">Stone</option>
                        <option value="wood">Wood</option>
                        <option value="sand">Sand</option>
                        <option value="metal">Metal</option>
                    </select>
                </div>

                <div id="prop-field-color">
                    <label>Color:</label>
                    <input type="color" id="prop-color" oninput="updateSelectedObjectProperties()">
                </div>

                <div id="prop-field-rotation">
                    <label>Rotation (Degrees):</label>
                    <input type="number" id="prop-rotation" min="0" max="360" oninput="updateSelectedObjectProperties()">
                </div>

                <div id="prop-field-collision">
                    <label>Collision (Solid Block):</label>
                    <select id="prop-collide" onchange="updateSelectedObjectProperties()">
                        <option value="true">On</option>
                        <option value="false">Off</option>
                    </select>
                </div>

                <div id="prop-field-drag" class="inline-checkbox-container" style="display: none;">
                    <input type="checkbox" id="prop-drag-on" onchange="updateSelectedObjectProperties()">
                    <label for="prop-drag-on" style="margin:0; color: blue; font-weight: bold;">Conveyor Physics (Rideable)</label>
                </div>

                <div id="prop-field-speed" style="display: none;">
                    <label>Speed Modifier:</label>
                    <input type="number" id="prop-speed" min="1" max="50" oninput="updateSelectedObjectProperties()">
                </div>

                <button class="action-btn" style="border-color: red; color: red; width: 100%; margin-top: 15px;" onclick="deleteSelectedObject()">Delete</button>
            </div>
        </div>
    </div>

    <script>
        const RegisteredUserAccountsDatabase = {
            "admin": "password123",
            "creator": "arcadia2026",
            "player1": "testpass"
        };

        let meterScaleFactor = 20;
        let totalMapMeters = 40;
        let activeToolState = 'move';
        let isPlaytesting = false;

        let sceneObjects = [];
        let droppedTools = [];
        let hammerBlocks = [];
        let activeProjectilesList = [];
        let objectIdCounter = 0;
        
        let selectedObjectTarget = null;
        let selectedToolNodeTarget = null;
        let defaultStarterPack = [];

        let simulatePlayerCount = 1;
        let playersData = {};
        let activeControlledPlayerId = null;

        let hammerCooldownTimer = 0;
        let hammerCooldownInterval = null;
        let gunCooldownTimer = 0;

        let camX = 50, camY = 50, currentZoomScale = 1.0;
        let editorCamSpeed = 8;

        let isDraggingTransform = false;
        let startMouseX = 0, startMouseY = 0, startObjLeft = 0, startObjTop = 0, startObjWidth = 0, startObjHeight = 0;
        let currentActiveScaleHandle = null;

        let isRotatingObj = false, centerPointX = 0, centerPointY = 0, startAngle = 0, baseRotation = 0;

        let animationRuntimeLoop = null;
        let playtestPhysicsLoop = null;
        let keyLayoutState = {};

        window.addEventListener('DOMContentLoaded', () => {
            setupViewportCameraControls();
            setupGlobalInputHandlers();
            setupMapClicksForTools();
            setupCooldownHUDTracking();
        });

        function setupViewportCameraControls() {
            const container = document.getElementById('viewport-container');
            
            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                let zoomFactor = 0.08;
                if (e.deltaY < 0) {
                    currentZoomScale = Math.min(4.0, currentZoomScale + zoomFactor);
                } else {
                    currentZoomScale = Math.max(0.3, currentZoomScale - zoomFactor);
                }
                updateCameraTransformDOM();
            }, { passive: false });
        }

        function setupCooldownHUDTracking() {
            window.addEventListener('mousemove', (e) => {
                let indicator = document.getElementById('hammer-cooldown-indicator');
                if (hammerCooldownTimer > 0 && isPlaytesting) {
                    indicator.style.left = e.clientX + "px";
                    indicator.style.top = e.clientY + "px";
                }
            });
        }

        function initializeStudioWorkspace() {
            totalMapMeters = parseInt(document.getElementById('map-size-input').value) || 40;
            document.getElementById('live-map-resize').value = totalMapMeters;
            updateMapGridDimensionsDOM();
            document.getElementById('setup-overlay').style.display = "none";
            updateCameraTransformDOM();
            
            if(animationRuntimeLoop) clearInterval(animationRuntimeLoop);
            animationRuntimeLoop = setInterval(() => {
                if(!isPlaytesting) {
                    let camMoved = false;
                    if (keyLayoutState['w'] || keyLayoutState['arrowup'])    { camY += editorCamSpeed; camMoved = true; }
                    if (keyLayoutState['s'] || keyLayoutState['arrowdown'])  { camY -= editorCamSpeed; camMoved = true; }
                    if (keyLayoutState['a'] || keyLayoutState['arrowleft'])  { camX += editorCamSpeed; camMoved = true; }
                    if (keyLayoutState['d'] || keyLayoutState['arrowright']) { camX -= editorCamSpeed; camMoved = true; }
                    if (camMoved) updateCameraTransformDOM();
                }

                if (isPlaytesting && gunCooldownTimer > 0) {
                    gunCooldownTimer -= 0.016;
                }

                sceneObjects.forEach(obj => {
                    if(obj.type === 'moving') {
                        let oldLeft = obj.left;
                        let oldTop = obj.top;
                        advanceLinearNodeTrack(obj, 0.016);
                        obj.velocityX = obj.left - oldLeft;
                        obj.velocityY = obj.top - oldTop;
                        updateObjectElementPositionDOM(obj);
                    } else if(obj.type === 'spinning') {
                        let prevRot = obj.rotation;
                        obj.rotation = (obj.rotation + (obj.speed || 2)) % 360;
                        obj.angularVelocity = obj.rotation - prevRot;
                        updateObjectElementPositionDOM(obj);
                    }
                });
                if(!isPlaytesting && selectedObjectTarget && selectedObjectTarget.type === 'moving') {
                    renderWaypointsOverlayDOM(selectedObjectTarget);
                }
            }, 16);
        }

        function changeMapDimensionsLive(meters) {
            let val = parseInt(meters);
            if(val && val >= 10 && val <= 300) {
                totalMapMeters = val;
                updateMapGridDimensionsDOM();
            }
        }

        function updateMapGridDimensionsDOM() {
            const grid = document.getElementById('map-grid');
            const pxSize = totalMapMeters * meterScaleFactor;
            grid.style.width = pxSize + "px";
            grid.style.height = pxSize + "px";
        }

        function setupGlobalInputHandlers() {
            window.addEventListener('keydown', (e) => {
                let lowerKey = e.key.toLowerCase();
                keyLayoutState[lowerKey] = true;
                
                if(['arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' '].includes(lowerKey)) {
                    if(document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
                        e.preventDefault();
                    }
                }

                if(isPlaytesting && activeControlledPlayerId) {
                    let activePlayer = playersData[activeControlledPlayerId];
                    
                    if(lowerKey === 'a' || lowerKey === 'arrowleft') {
                        activePlayer.facingDirection = 'left';
                        syncHeldToolVisualsDOM();
                    }
                    if(lowerKey === 'd' || lowerKey === 'arrowright') {
                        activePlayer.facingDirection = 'right';
                        syncHeldToolVisualsDOM();
                    }

                    if(lowerKey === '1' && activePlayer.inventory[0]) {
                        activePlayer.selectedTool = activePlayer.inventory[0];
                        renderInventoryHotbarHUD();
                        syncHeldToolVisualsDOM();
                    }
                    if(lowerKey === '2' && activePlayer.inventory[1]) {
                        activePlayer.selectedTool = activePlayer.inventory[1];
                        renderInventoryHotbarHUD();
                        syncHeldToolVisualsDOM();
                    }
                    if(lowerKey === '3' && activePlayer.inventory[2]) {
                        activePlayer.selectedTool = activePlayer.inventory[2];
                        renderInventoryHotbarHUD();
                        syncHeldToolVisualsDOM();
                    }
                    if(lowerKey === ' ' || lowerKey === 'f') {
                        triggerActivePlayerAttack();
                    }
                }
            });

            window.addEventListener('keyup', (e) => { 
                keyLayoutState[e.key.toLowerCase()] = false; 
            });

            window.addEventListener('blur', () => {
                keyLayoutState = {};
            });
        }

        /* FIXED INTERCEPTION BUG: Global window click handler tracks actual viewport coordinates */
        function setupMapClicksForTools() {
            window.addEventListener('mousedown', (e) => {
                if(!isPlaytesting || !activeControlledPlayerId) return;
                
                // Track back to view container parent to allow clicks anywhere inside viewport space
                const viewContainer = document.getElementById('viewport-container');
                if(!viewContainer.contains(e.target)) return;
                
                // Ignore clicks landing explicitly inside HUD hotbar
                if(document.getElementById('hud-hotbar').contains(e.target)) return;

                let activePlayer = playersData[activeControlledPlayerId];
                if(activePlayer.health <= 0) return;

                let rect = document.getElementById('map-grid').getBoundingClientRect();
                let clickX = (e.clientX - rect.left) / currentZoomScale;
                let clickY = (e.clientY - rect.top) / currentZoomScale;

                if(activePlayer.selectedTool === 'hammer') {
                    if (hammerCooldownTimer > 0) return; 
                    buildHammerBlockAtClickLocation(clickX, clickY);
                    triggerHeldToolSlashEffect();
                    startHammerCooldownSequence();
                } else if(activePlayer.selectedTool === 'gun') {
                    fireRangedGunBullet(clickX, clickY);
                } else if(activePlayer.selectedTool === 'sword') {
                    triggerActivePlayerAttack();
                }
            });
        }

            indicator.style.display = "block";

            if (hammerCooldownInterval) clearInterval(hammerCooldownInterval);
            hammerCooldownInterval = setInterval(() => {
                hammerCooldownTimer--;
                if (hammerCooldownTimer <= 0) {
                    clearInterval(hammerCooldownInterval);
                    indicator.style.display = "none";
                } else {
                    indicator.textContent = "Cooldown: " + hammerCooldownTimer;

        function checkShapeSpecificCollision(playerBox, shape, obj) {
            let angleDeg = obj.rotation || 0;
            let objCenterX = obj.left + obj.width / 2;
            let objCenterY = obj.top + obj.height / 2;
            let playerCenterX = playerBox.x + playerBox.width / 2;
            let playerCenterY = playerBox.y + playerBox.height / 2;

            let localPlayerX = playerCenterX;
            let localPlayerY = playerCenterY;

            if (angleDeg !== 0) {
                let rad = -angleDeg * Math.PI / 180;
                let cos = Math.cos(rad);
                let sin = Math.sin(rad);
                let dx = playerCenterX - objCenterX;
                let dy = playerCenterY - objCenterY;
                localPlayerX = objCenterX + (dx * cos - dy * sin);
                localPlayerY = objCenterY + (dx * sin + dy * cos);
            }

            let pLeft = localPlayerX - playerBox.width / 2;
            let pRight = localPlayerX + playerBox.width / 2;
            let pTop = localPlayerY - playerBox.height / 2;
            let pBottom = localPlayerY + playerBox.height / 2;

            if (pRight < obj.left || pLeft > obj.left + obj.width || pBottom < obj.top || pTop > obj.top + obj.height) {
                return false; 
            }
            if (shape === 'cube' || shape === 'sign') return true; 

            if (shape === 'circle') {
                let cx = obj.left + obj.width / 2;
                let cy = obj.top + obj.height / 2;
                let rx = obj.width / 2;
                let ry = obj.height / 2;
                let closestX = Math.max(pLeft, Math.min(cx, pRight));
                let closestY = Math.max(pTop, Math.min(cy, pBottom));
                let distX = (closestX - cx) / rx;
                let distY = (closestY - cy) / ry;
                return (distX * distX + distY * distY) <= 1;
            }

            if (shape === 'wedge') {
                let localX = ((pLeft + pRight) / 2) - obj.left;
                let localY = ((pTop + pBottom) / 2) - obj.top;
                return ((localX / obj.width) + (localY / obj.height) >= 1.0);
            }

            if (shape === 'octagon' || shape === 'halfcircle' || shape === 'arch') {
                let cx = obj.left + obj.width / 2;
                let cy = obj.top + obj.height / 2;
                let dx = Math.abs(((pLeft + pRight) / 2) - cx) / (obj.width / 2);
                let dy = Math.abs(((pTop + pBottom) / 2) - cy) / (obj.height / 2);
                return (dx + dy <= 1.45) && (dx <= 1.0 && dy <= 1.0);
            }
            return true;
        }

        function fireRangedGunBullet(targetX, targetY) {
            let shooter = playersData[activeControlledPlayerId];
            if(!shooter || shooter.health <= 0) return;
            
            if (gunCooldownTimer > 0) return;

            triggerHeldToolSlashEffect();
            gunCooldownTimer = 0.5;

            objectIdCounter++;
            let bId = "bullet_" + objectIdCounter;

            let startX = shooter.x + (shooter.facingDirection === 'left' ? 10 : 65);
            let startY = shooter.y + 42; 

            let angle = Math.atan2(targetY - startY, targetX - startX);
            let speed = 12;

            let proj = {
                id: bId,
                x: startX,
                y: startY,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                ownerId: shooter.id
            };

            activeProjectilesList.push(proj);

            let el = document.createElement('div');
            el.id = bId;
            el.className = "bullet-projectile";
            el.style.left = proj.x + "px";
            el.style.top = proj.y + "px";
            document.getElementById('projectiles-layer').appendChild(el);
        }

        function runPlaytestPhysicsLoop() {
            playtestPhysicsLoop = setInterval(() => {
                let speed = 5 * meterScaleFactor * 0.016;
                let activeUser = playersData[activeControlledPlayerId];

                /* ADVANCE RANGED PROJECTILES & COLLISION DETECTION */
                for(let i = activeProjectilesList.length - 1; i >= 0; i--) {
                    let p = activeProjectilesList[i];
                    p.x += p.vx;
                    p.y += p.vy;

                    let pEl = document.getElementById(p.id);
                    if(pEl) {
                        pEl.style.left = p.x + "px";
                        pEl.style.top = p.y + "px";
                    }

                    let hitTarget = false;
                    let pBox = { x: p.x, y: p.y, width: 6, height: 6 };

                    for(let pId in playersData) {
                        if(pId === p.ownerId) continue;
                        let targetPlayer = playersData[pId];
                        if(targetPlayer.health > 0) {
                            if(p.x >= targetPlayer.x && p.x <= targetPlayer.x + 75 && p.y >= targetPlayer.y && p.y <= targetPlayer.y + 75) {
                                damagePlayerTarget(targetPlayer, 20);
                                hitTarget = true;
                                break;
                            }
                        }
                    }

                    if(!hitTarget) {
                        let obstacles = [...sceneObjects, ...hammerBlocks];
                        for(let j = obstacles.length - 1; j >= 0; j--) {
                            let obj = obstacles[j];
                            if(obj.type === 'spawn') continue;
                            if(checkShapeSpecificCollision(pBox, obj.shape || 'cube', obj)) {
                                hitTarget = true;
                                if(hammerBlocks.includes(obj)) {
                                    document.getElementById(obj.id)?.remove();
                                    hammerBlocks.splice(hammerBlocks.indexOf(obj), 1);
                                }
                                break;
                            }
                        }
                    }

                    let limit = totalMapMeters * meterScaleFactor;
                    if(hitTarget || p.x < 0 || p.x > limit || p.y < 0 || p.y > limit) {
                        document.getElementById(p.id)?.remove();
                        activeProjectilesList.splice(i, 1);
                    }
                }

                if(activeUser && activeUser.health > 0) {
                    let nextX = activeUser.x;
                    let nextY = activeUser.y;

                    let horizontalInput = false;

                    if(keyLayoutState['w'] || keyLayoutState['arrowup']) nextY -= speed;
                    if(keyLayoutState['s'] || keyLayoutState['arrowdown']) nextY += speed;
                    
                    if(keyLayoutState['a'] || keyLayoutState['arrowleft']) { 
                        nextX -= speed; 
                        activeUser.facingDirection = 'left';
                        horizontalInput = true;
                    }
                    if(keyLayoutState['d'] || keyLayoutState['arrowright']) { 
                        nextX += speed; 
                        activeUser.facingDirection = 'right';
                        horizontalInput = true;
                    }

                    if (horizontalInput) {
                        syncHeldToolVisualsDOM();
                    }

                    sceneObjects.forEach(obj => {
                        let currentBox = { x: activeUser.x, y: activeUser.y, width: 75, height: 75 };
                        
                        if(checkShapeSpecificCollision(currentBox, obj.shape, obj)) {
                            if (obj.dragOn) {
                                if(obj.type === 'moving' && obj.velocityX !== undefined && obj.velocityY !== undefined) {
                                    nextX += obj.velocityX;
                                    nextY += obj.velocityY;
                                    activeUser.x += obj.velocityX;
                                    activeUser.y += obj.velocityY;
                                } else if(obj.type === 'spinning' && obj.angularVelocity) {
                                    let rad = obj.angularVelocity * Math.PI / 180;
                                    let cx = obj.left + obj.width/2;
                                    let cy = obj.top + obj.height/2;
                                    let rx = (activeUser.x + 37.5) - cx;
                                    let ry = (activeUser.y + 37.5) - cy;
                                    let rotX = (rx * Math.cos(rad) - ry * Math.sin(rad)) - rx;
                                    let rotY = (rx * Math.sin(rad) + ry * Math.cos(rad)) - ry;
                                    nextX += rotX;
                                    nextY += rotY;
                                    activeUser.x += rotX;
                                    activeUser.y += rotY;
                                }
                            } else if (obj.collide) {
                                if(obj.type === 'moving' && (obj.velocityX || obj.velocityY)) {
                                    nextX += obj.velocityX;
                                    nextY += obj.velocityY;
                                    activeUser.x += obj.velocityX;
                                    activeUser.y += obj.velocityY;
                                }
                            }
                        }
                    });

                    let limit = totalMapMeters * meterScaleFactor;
                    if(nextX < 0) nextX = 0; if(nextY < 0) nextY = 0;
                    if(nextX > limit - 75) nextX = limit - 75; if(nextY > limit - 75) nextY = limit - 75;

                    let hitH = false, hitV = false;
                    let obstacles = [...sceneObjects, ...hammerBlocks];
                    
                    obstacles.forEach(obj => {
                        if(!obj.collide || obj.type === 'spawn') return;
                        if(obj.dragOn && checkShapeSpecificCollision({x: activeUser.x, y: activeUser.y, width: 75, height: 75}, obj.shape || 'cube', obj)) {
                            return;
                        }

                        let shapeType = obj.shape || 'cube';
                        let currentlyInside = checkShapeSpecificCollision({x: activeUser.x, y: activeUser.y, width: 75, height: 75}, shapeType, obj);
                        
                        if(checkShapeSpecificCollision({x: nextX, y: activeUser.y, width: 75, height: 75}, shapeType, obj)) {
                            if(!currentlyInside) hitH = true; 
                        }
                        if(checkShapeSpecificCollision({x: activeUser.x, y: nextY, width: 75, height: 75}, shapeType, obj)) {
                            if(!currentlyInside) hitV = true; 
                        }
                    });

                    if(!hitH) activeUser.x = nextX;
                    if(!hitV) activeUser.y = nextY;

                    let el = document.getElementById("char_" + activeControlledPlayerId);
                    if(el) { el.style.left = activeUser.x + "px"; el.style.top = activeUser.y + "px"; }

                    sceneObjects.forEach(obj => {
                        if(obj.type === 'kill') {
                            let updatedBox = { x: activeUser.x, y: activeUser.y, width: 75, height: 75 };
                            if(checkShapeSpecificCollision(updatedBox, obj.shape, obj)) {
                                damagePlayerTarget(activeUser, 100);
                            }
                        }
                    });

                    if (activeUser.health > 0) {
                        droppedTools.forEach((tool, index) => {
                            if(checkShapeSpecificCollision({x: activeUser.x, y: activeUser.y, width: 75, height: 75}, 'cube', {left: tool.left, top: tool.top, width: 35, height: 35})) {
                                if(!activeUser.inventory.includes(tool.type)) {
                                    activeUser.inventory.push(tool.type);
                                    if(!activeUser.selectedTool) activeUser.selectedTool = tool.type;
                                    renderInventoryHotbarHUD();
                                    syncHeldToolVisualsDOM();
                                }
                                document.getElementById(tool.id)?.remove();
                                droppedTools.splice(index, 1);
                            }
                        });
                    }

                    updateCameraToActivePlayerFocus();
                }
            }, 16);
        }

        function damagePlayerTarget(target, amount) {
            target.health = Math.max(0, target.health - amount);
            let fill = document.getElementById(`hp_fill_${target.id}`);
            if(fill) fill.style.width = target.health + "%";
            if(target.health <= 0 && target.id === activeControlledPlayerId) {
                document.getElementById('death-screen').style.display = "flex";
                syncHeldToolVisualsDOM();
            }
        }

        function triggerActivePlayerAttack() {
            let attacker = playersData[activeControlledPlayerId];
            if(!attacker || attacker.health <= 0) return;

            if(attacker.selectedTool === 'gun') {
                let trackingEl = document.getElementById("char_" + attacker.id);
                if(trackingEl) {
                    let aimX = attacker.x + (attacker.facingDirection === 'left' ? -200 : 275);
                    let aimY = attacker.y + 42;
                    fireRangedGunBullet(aimX, aimY);
                }
                return;
            }

            if(attacker.selectedTool !== 'sword') return;
            triggerHeldToolSlashEffect();

            for(let pId in playersData) {
                if(pId === attacker.id) continue;
                let target = playersData[pId];
                if(target.health <= 0) continue;
                if(Math.sqrt((attacker.x - target.x)**2 + (attacker.y - target.y)**2) <= 110) damagePlayerTarget(target, 25);
            }

            hammerBlocks.forEach((block, index) => {
                if(Math.sqrt((attacker.x - block.left)**2 + (attacker.y - block.top)**2) <= 120) {
                    document.getElementById(block.id)?.remove();
                    hammerBlocks.splice(index, 1);
                }
            });
        }

        function buildHammerBlockAtClickLocation(targetX, targetY) {
            objectIdCounter++;
            let bId = "hammer_block_" + objectIdCounter;
            
            let hBlock = { left: targetX - 20, top: targetY - 20, width: 40, height: 40, collide: true, id: bId };
            hammerBlocks.push(hBlock);

            let colors = ['#ff0055', '#00ffaa', '#ffaa00', '#00aaff', '#cc00ff', '#ffff00'];
            let randomColor = colors[Math.floor(Math.random() * colors.length)];

            let el = document.createElement('div');
            el.id = bId; el.className = 'editor-obj shape-cube';
            el.style.left = hBlock.left + "px"; el.style.top = hBlock.top + "px";
            el.style.width = hBlock.width + "px"; el.style.height = hBlock.height + "px";
            el.style.backgroundColor = randomColor;
            
            document.getElementById('map-grid').appendChild(el);
            setTimeout(() => {
                document.getElementById(bId)?.remove();
                hammerBlocks = hammerBlocks.filter(b => b.id !== bId);
            }, 10000);
        }

        function respawnActiveCharacter() {
            let spawnObj = sceneObjects.find(o => o.type === 'spawn');
            let target = playersData[activeControlledPlayerId];
            if(!target || !spawnObj) return;

            document.getElementById('death-screen').style.display = "none";
            target.health = 100;
            target.x = spawnObj.left + (spawnObj.width / 2) - 37.5;
            target.y = spawnObj.top + (spawnObj.height / 2) - 37.5;
            target.facingDirection = 'right';

            let fill = document.getElementById(`hp_fill_${target.id}`);
            if(fill) fill.style.width = "100%";
            syncHeldToolVisualsDOM();
        }

        function spawnMapElement(primitiveType, shapeGeometry) {
            objectIdCounter++;
            let newObj = {
                id: "obj_" + objectIdCounter,
                type: primitiveType,
                shape: shapeGeometry,
                left: 100, top: 100, width: 120, height: 60, rotation: 0,
                material: 'plastic', color: '#e6c280', text: 'Sign Post',
                collide: primitiveType !== 'kill' && primitiveType !== 'spawn',
                speed: primitiveType === 'spinning' ? 3 : 4,
                dragOn: true,
                nodeA: { x: 100, y: 100 }, nodeB: { x: 300, y: 100 }, targetNode: 'B'
            };

            sceneObjects.push(newObj);
            renderObjectElementDOM(newObj);
            selectObjectTarget(newObj);
        }

        function renderObjectElementDOM(obj) {
            const el = document.createElement('div');
            el.id = obj.id;
            el.className = `editor-obj shape-${obj.shape}`;

            el.addEventListener('mousedown', (e) => {
                // Allows click event to safely trickle down to general weapon logic during playtest
                if(isPlaytesting) return;
                e.stopPropagation();
                selectObjectTarget(obj);
                if(activeToolState === 'move') initiateTransformDrag(e, null);
            });
            document.getElementById('map-grid').appendChild(el);
            updateObjectElementPositionDOM(obj);
        }

        function updateObjectElementPositionDOM(obj) {
            const el = document.getElementById(obj.id);
            if(!el) return;
            
            el.className = `editor-obj shape-${obj.shape} mat-${obj.material}`;
            if(obj.type === 'kill') el.classList.add('obj-kill');
            if(obj.type === 'spawn') el.classList.add('obj-spawn');
            if(obj.type === 'spinning') el.classList.add('obj-spinning');
            if(selectedObjectTarget && selectedObjectTarget.id === obj.id) el.classList.add('selected');

            el.style.left = obj.left + "px"; el.style.top = obj.top + "px";
            el.style.width = obj.width + "px"; el.style.height = obj.height + "px";
            el.style.transform = `rotate(${obj.rotation}deg)`;
            
            if(obj.shape === 'octagon') {
                el.innerHTML = `
                    <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none" style="display:block; pointer-events:none;">
                        <polygon points="30,2 70,2 98,30 98,70 70,98 30,98 2,70 2,30" fill="${obj.color}" stroke="black" stroke-width="2.5" vector-effect="non-scaling-stroke"/>
                    </svg>
                `;
            } else if(obj.shape === 'wedge') {
                el.innerHTML = `
                    <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none" style="display:block; pointer-events:none;">
                        <polygon points="0,100 100,0 100,100" fill="${obj.color}" stroke="black" stroke-width="2.5" vector-effect="non-scaling-stroke"/>
                    </svg>
                `;
            } else if(obj.shape === 'sign') {
                let approxFontSize = Math.max(10, Math.min(obj.height * 0.35, obj.width * 0.15));
                el.innerHTML = `<span style="font-size: ${approxFontSize}px;"></span>`;
                el.querySelector('span').textContent = obj.text || '';
                el.style.backgroundColor = (obj.material === 'plastic') ? obj.color : "transparent";
            } else {
                el.innerHTML = '';
                el.style.backgroundColor = (obj.material === 'plastic') ? obj.color : "transparent";
            }
        }

        function selectObjectTarget(obj) {
            clearSelectionStates();
            selectedObjectTarget = obj;
            
            const el = document.getElementById(obj.id);
            if(el) el.classList.add('selected');

            document.getElementById('properties-empty-notice').style.display = "none";
            document.getElementById('properties-editor-form').style.display = "block";
            
            document.getElementById('prop-id').value = obj.id;
            document.getElementById('prop-material').value = obj.material;
            document.getElementById('prop-color').value = obj.color;
            document.getElementById('prop-rotation').value = obj.rotation;
            document.getElementById('prop-collide').value = obj.collide.toString();
            document.getElementById('prop-speed').value = obj.speed || 4;
            document.getElementById('prop-drag-on').checked = obj.dragOn !== false;

            document.getElementById('prop-field-color').style.display = "block";
            document.getElementById('prop-field-rotation').style.display = "block";
            document.getElementById('prop-field-speed').style.display = (obj.type === 'moving' || obj.type === 'spinning') ? "block" : "none";
            document.getElementById('prop-field-drag').style.display = (obj.type === 'moving' || obj.type === 'spinning') ? "flex" : "none";
            
            if(obj.shape === 'sign') {
                document.getElementById('prop-field-text').style.display = "block";
                document.getElementById('prop-text').value = obj.text || '';
            } else {
                document.getElementById('prop-field-text').style.display = "none";
            }

            if(!isPlaytesting) {
                if(activeToolState === 'scale') appendScaleHandlesDOM(el);
                if(activeToolState === 'rotate') appendRotateHandleDOM(el);
                if(obj.type === 'moving') renderWaypointsOverlayDOM(obj);
            }
        }

        function appendScaleHandlesDOM(parentEl) {
            ['t', 'b', 'l', 'r'].forEach(dir => {
                const handle = document.createElement('div');
                handle.className = `scale-handle handle-${dir}`;
                handle.addEventListener('mousedown', (e) => { e.stopPropagation(); initiateTransformDrag(e, dir); });
                parentEl.appendChild(handle);
            });
        }

        function appendRotateHandleDOM(parentEl) {
            const line = document.createElement('div'); line.className = 'rotate-line';
            const handle = document.createElement('div'); handle.className = 'rotate-handle';
            handle.addEventListener('mousedown', (e) => { e.stopPropagation(); initiateMouseRotation(e); });
            parentEl.appendChild(line); parentEl.appendChild(handle);
        }

        function renderWaypointsOverlayDOM(obj) {
            let canvas = document.getElementById('path-visualizer-canvas');
            let layer = document.getElementById('path-nodes-layer');
            if(!canvas || !layer) return;

            let cX1 = obj.nodeA.x + obj.width/2;
            let cY1 = obj.nodeA.y + obj.height/2;
            let cX2 = obj.nodeB.x + obj.width/2;
            let cY2 = obj.nodeB.y + obj.height/2;

            canvas.innerHTML = `
                <line x1="${cX1}" y1="${cY1}" x2="${cX2}" y2="${cY2}" stroke="black" stroke-width="3" stroke-dasharray="6,6" />
            `;

            if(layer.children.length === 0) {
                let dotA = document.createElement('div');
                dotA.className = "visual-node-dot node-dot-a";
                dotA.title = "Waypoint A";
                dotA.addEventListener('mousedown', (e) => initiateWaypointNodeDrag(e, obj, 'nodeA'));

                let dotB = document.createElement('div');
                dotB.className = "visual-node-dot node-dot-b";
                dotB.title = "Waypoint B";
                dotB.addEventListener('mousedown', (e) => initiateWaypointNodeDrag(e, obj, 'nodeB'));

                layer.appendChild(dotA);
                layer.appendChild(dotB);
            }

            layer.children[0].style.left = cX1 + "px";
            layer.children[0].style.top = cY1 + "px";
            layer.children[1].style.left = cX2 + "px";
            layer.children[1].style.top = cY2 + "px";
        }

        function initiateWaypointNodeDrag(e, obj, nodeKey) {
            e.stopPropagation();
            let startMyaX = e.clientX;
            let startMyaY = e.clientY;
            let baseNodeX = obj[nodeKey].x;
            let baseNodeY = obj[nodeKey].y;

            let dragNodeMove = (ev) => {
                let dx = (ev.clientX - startMyaX) / currentZoomScale;
                let dy = (ev.clientY - startMyaY) / currentZoomScale;
                obj[nodeKey].x = baseNodeX + dx;
                obj[nodeKey].y = baseNodeY + dy;
                renderWaypointsOverlayDOM(obj);
            };

            let dragNodeStop = () => {
                document.removeEventListener('mousemove', dragNodeMove);
                document.removeEventListener('mouseup', dragNodeStop);
            };

            document.addEventListener('mousemove', dragNodeMove);
            document.addEventListener('mouseup', dragNodeStop);
        }

        function initiateMouseRotation(e) {
            if(!selectedObjectTarget) return;
            isRotatingObj = true;
            const el = document.getElementById(selectedObjectTarget.id);
            const rect = el.getBoundingClientRect();
            centerPointX = rect.left + rect.width / 2; centerPointY = rect.top + rect.height / 2;
            startAngle = Math.atan2(e.clientY - centerPointY, e.clientX - centerPointX) * (180 / Math.PI);
            baseRotation = selectedObjectTarget.rotation;
            
            let moveRot = (ev) => {
                if(!isRotatingObj) return;
                let currentAngle = Math.atan2(ev.clientY - centerPointY, ev.clientX - centerPointX) * (180 / Math.PI);
                selectedObjectTarget.rotation = Math.round((baseRotation + (currentAngle - startAngle)) % 360);
                if(selectedObjectTarget.rotation < 0) selectedObjectTarget.rotation += 360;
                document.getElementById('prop-rotation').value = selectedObjectTarget.rotation;
                updateObjectElementPositionDOM(selectedObjectTarget);
            };
            let stopRot = () => { isRotatingObj = false; document.removeEventListener('mousemove', moveRot); };
            document.addEventListener('mousemove', moveRot);
            document.addEventListener('mouseup', stopRot);
        }

        function clearSelectionStates() {
            selectedObjectTarget = null;
            if(selectedToolNodeTarget) {
                selectedToolNodeTarget.element.classList.remove('selected');
                selectedToolNodeTarget = null;
            }
            document.querySelectorAll('.editor-obj, .dropped-tool').forEach(el => {
                el.classList.remove('selected');
                el.querySelectorAll('.scale-handle, .rotate-handle, .rotate-line').forEach(h => h.remove());
            });
            document.getElementById('path-visualizer-canvas').innerHTML = "";
            document.getElementById('path-nodes-layer').innerHTML = "";

            document.getElementById('properties-editor-form').style.display = "none";
            document.getElementById('properties-empty-notice').style.display = "block";
            document.getElementById('prop-field-tool-options').style.display = "none";
            document.getElementById('prop-field-text').style.display = "none";
            document.getElementById('prop-field-material').style.display = "block";
            document.getElementById('prop-field-color').style.display = "block";
            document.getElementById('prop-field-rotation').style.display = "block";
            document.getElementById('prop-field-collision').style.display = "block";
        }

        function initiateTransformDrag(e) {
            isDraggingTransform = true;
            currentActiveScaleHandle = activeToolState === 'scale' ? arguments[1] : null;
            startMouseX = e.clientX; startMouseY = e.clientY;
            
            if(selectedToolNodeTarget) {
                startObjLeft = selectedToolNodeTarget.obj.left;
                startObjTop = selectedToolNodeTarget.obj.top;
            } else {
                startObjLeft = selectedObjectTarget.left; startObjTop = selectedObjectTarget.top;
                startObjWidth = selectedObjectTarget.width; startObjHeight = selectedObjectTarget.height;
            }
            
            document.addEventListener('mousemove', processTransformDrag);
            document.addEventListener('mouseup', () => {
                isDraggingTransform = false;
                document.removeEventListener('mousemove', processTransformDrag);
            });
        }

        function processTransformDrag(e) {
            if(!isDraggingTransform) return;
            let deltaX = (e.clientX - startMouseX) / currentZoomScale;
            let deltaY = (e.clientY - startMouseY) / currentZoomScale;
            
            if(selectedToolNodeTarget) {
                selectedToolNodeTarget.obj.left = startObjLeft + deltaX;
                selectedToolNodeTarget.obj.top = startObjTop + deltaY;
                selectedToolNodeTarget.element.style.left = selectedToolNodeTarget.obj.left + "px";
                selectedToolNodeTarget.element.style.top = selectedToolNodeTarget.obj.top + "px";
                return;
            }

            if(activeToolState === 'move') {
                selectedObjectTarget.left = startObjLeft + deltaX;
                selectedObjectTarget.top = startObjTop + deltaY;
                if(selectedObjectTarget.type === 'moving') {
                    selectedObjectTarget.nodeA.x = selectedObjectTarget.left;
                    selectedObjectTarget.nodeB.x = selectedObjectTarget.left + 200;
                }
            } else if(activeToolState === 'scale' && currentActiveScaleHandle) {
                let angleDeg = selectedObjectTarget.rotation || 0;
                let rad = angleDeg * Math.PI / 180;
                
                let localDX = deltaX * Math.cos(-rad) - deltaY * Math.sin(-rad);
                let localDY = deltaX * Math.sin(-rad) + deltaY * Math.cos(-rad);

                if(currentActiveScaleHandle === 'r') {
                    selectedObjectTarget.width = Math.max(15, startObjWidth + localDX);
                }
                if(currentActiveScaleHandle === 'l') { 
                    let newW = Math.max(15, startObjWidth - localDX);
                    let change = startObjWidth - newW;
                    selectedObjectTarget.width = newW;
                    selectedObjectTarget.left = startObjLeft + change * Math.cos(rad);
                    selectedObjectTarget.top = startObjTop + change * Math.sin(rad);
                }
                if(currentActiveScaleHandle === 'b') {
                    selectedObjectTarget.height = Math.max(15, startObjHeight + localDY);
                }
                if(currentActiveScaleHandle === 't') {
                    let newH = Math.max(15, startObjHeight - localDY);
                    let change = startObjHeight - newH;
                    selectedObjectTarget.height = newH;
                    selectedObjectTarget.left = startObjLeft - change * Math.sin(rad);
                    selectedObjectTarget.top = startObjTop + change * Math.cos(rad);
                }
            }
            updateObjectElementPositionDOM(selectedObjectTarget);
            if(activeToolState === 'scale') {
                let el = document.getElementById(selectedObjectTarget.id);
                appendScaleHandlesDOM(el);
            }
        }

        function updateSelectedObjectProperties() {
            if(!selectedObjectTarget) return;
            selectedObjectTarget.material = document.getElementById('prop-material').value;
            selectedObjectTarget.color = document.getElementById('prop-color').value;
            selectedObjectTarget.rotation = parseInt(document.getElementById('prop-rotation').value) || 0;
            selectedObjectTarget.collide = (document.getElementById('prop-collide').value === "true");
            selectedObjectTarget.speed = parseFloat(document.getElementById('prop-speed').value) || 4;
            selectedObjectTarget.dragOn = document.getElementById('prop-drag-on').checked;
            
            if(selectedObjectTarget.shape === 'sign') {
                selectedObjectTarget.text = document.getElementById('prop-text').value;
            }
            
            updateObjectElementPositionDOM(selectedObjectTarget);
        }

        function deleteSelectedObject() {
            if(selectedToolNodeTarget) {
                document.getElementById(selectedToolNodeTarget.obj.id)?.remove();
                droppedTools = droppedTools.filter(t => t.id !== selectedToolNodeTarget.obj.id);
                clearSelectionStates();
                return;
            }
            if(!selectedObjectTarget) return;
            document.getElementById(selectedObjectTarget.id)?.remove();
            sceneObjects = sceneObjects.filter(o => o.id !== selectedObjectTarget.id);
            clearSelectionStates();
        }

        function advanceLinearNodeTrack(obj, stepSeconds) {
            let target = (obj.targetNode === 'A') ? obj.nodeA : obj.nodeB;
            let dx = target.x - obj.left, dy = target.y - obj.top;
            let dist = Math.sqrt(dx*dx + dy*dy), frameAmt = obj.speed * meterScaleFactor * stepSeconds;
            if(dist <= frameAmt) { obj.left = target.x; obj.top = target.y; obj.targetNode = (obj.targetNode === 'B') ? 'A' : 'B'; }
            else { obj.left += (dx / dist) * frameAmt; obj.top += (dy / dist) * frameAmt; }
        }

        function generateSaveString() {
            let pkg = { mapSize: totalMapMeters, objects: sceneObjects, tools: droppedTools, starters: defaultStarterPack };
            prompt("Copy code output:", JSON.stringify(pkg));
        }

        function executeProjectPublishPipeline() {
            let title = document.getElementById('pub-title').value.trim();
            let desc = document.getElementById('pub-desc').value.trim();
            let user = document.getElementById('pub-user').value.trim();
            let pass = document.getElementById('pub-pass').value;

            if(!title || !desc || !user || !pass) {
                return alert("Please fill out all publishing fields.");
            }
            if (!RegisteredUserAccountsDatabase.hasOwnProperty(user) || RegisteredUserAccountsDatabase[user] !== pass) {
                return alert("Publishing Refused: Verification failed.");
            }

            let publishPayload = {
                meta: { title: title, desc: desc, author: user },
                data: { mapSize: totalMapMeters, objects: sceneObjects, tools: droppedTools, starters: defaultStarterPack }
            };
            prompt("Verified! Package generated. Copy this project string:", JSON.stringify(publishPayload));
            document.getElementById('pub-pass').value = "";
            document.getElementById('publish-overlay').style.display = 'none';
        }

        function loadFromString() {
            let str = document.getElementById('load-string-input').value.trim();
            if(!str) return alert("Input empty.");
            try {
                let parsed = JSON.parse(str);
                sceneObjects.forEach(o => document.getElementById(o.id)?.remove());
                droppedTools.forEach(t => document.getElementById(t.id)?.remove());
                
                totalMapMeters = parsed.mapSize || 40;
                sceneObjects = parsed.objects || (parsed.data ? parsed.data.objects : []);
                droppedTools = parsed.tools || (parsed.data ? parsed.data.tools : []);
                defaultStarterPack = parsed.starters || (parsed.data ? parsed.data.starters : []);
                
                initializeStudioWorkspace();
                sceneObjects.forEach(o => renderObjectElementDOM(o));
                droppedTools.forEach(t => {
                    let el = document.createElement('div');
                    el.id = t.id; el.className = 'dropped-tool';
                    el.style.backgroundImage = `url('${t.type}.png')`;
                    el.style.left = t.left + "px"; el.style.top = t.top + "px";
                    el.addEventListener('mousedown', (e) => { e.stopPropagation(); if(isPlaytesting) return; selectToolNodeTarget(t, el); });
                    document.getElementById('map-grid').appendChild(el);
                });
                clearSelectionStates();
            } catch(e) { alert("Data structure parse error."); }
        }
    </script>
</body>
